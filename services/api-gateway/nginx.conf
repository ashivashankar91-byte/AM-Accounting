events {
    worker_connections 1024;
}

http {
    upstream auth      { server auth-service:3001; }
    upstream tenants   { server tenant-service:3002; }
    upstream gl        { server gl-service:3010; }
    upstream eom       { server eom-service:3011; }
    upstream payroll   { server payroll-service:3012; }
    upstream apar      { server apar-service:3013; }
    upstream recon     { server recon-service:3014; }
    upstream agent_gl  { server agent-gl:3020; }
    upstream agent_eom { server agent-eom:3021; }
    upstream agent_pay { server agent-payroll:3022; }
    upstream agent_ap  { server agent-apar:3023; }
    upstream agent_t1  { server agent-t1:3024; }
    upstream notif     { server notification-service:3030; }
    upstream audit     { server audit-service:3031; }
    upstream connector { server connector-service:3032; }
    upstream approvals { server approval-service:3033; }
    upstream coa       { server coa-service:3016; }
    upstream fs        { server fs-service:3015; }
    upstream onboard   { server onboarding-service:3035; }

    # Default tenant ID when not provided by client
    map $http_x_tenant_id $tenant_id {
        default       $http_x_tenant_id;
        ""            "tenant-kunes";
    }

    server {
        listen 80;

        # Prevent nginx from using internal Docker hostnames in redirects
        absolute_redirect off;

        # Forward original host and all headers to upstream
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Always set x-tenant-id — uses client value or defaults to tenant-kunes
        proxy_set_header x-tenant-id $tenant_id;

        # Pass through other custom headers
        proxy_set_header x-admin-api-key $http_x_admin_api_key;
        proxy_set_header x-user-id $http_x_user_id;
        proxy_set_header Authorization $http_authorization;

        # Increase timeouts for slow services
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # CORS headers — allow all origins for dev
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, x-tenant-id, x-admin-api-key, x-user-id" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Handle preflight
        if ($request_method = OPTIONS) {
            return 204;
        }

        # Auth
        location /api/v1/auth {
            proxy_pass http://auth;
        }

        # Tenants
        location /api/v1/tenants {
            proxy_pass http://tenants;
        }

        # GL
        location /api/v1/gl {
            proxy_pass http://gl;
        }

        # Dashboard (served by gl-service)
        location /api/v1/dashboard {
            proxy_pass http://gl;
        }

        # Command Center (served by gl-service — computed endpoints)
        location /api/v1/command-center {
            proxy_pass http://gl;
        }

        # EOM
        location /api/v1/eom {
            proxy_pass http://eom;
        }

        # Payroll
        location /api/v1/payroll {
            proxy_pass http://payroll;
        }

        # AP/AR
        location /api/v1/apar {
            proxy_pass http://apar;
        }

        # Recon
        location /api/v1/recon {
            proxy_pass http://recon;
        }

        # Agents - Log (served by agent-t1, must be before /agents/t1)
        location /api/v1/agents/log {
            proxy_pass http://agent_t1;
        }

        # Agents - GL
        location /api/v1/agents/gl {
            proxy_pass http://agent_gl;
        }

        # Agents - EOM
        location /api/v1/agents/eom {
            proxy_pass http://agent_eom;
        }

        # Agents - Payroll
        location /api/v1/agents/payroll {
            proxy_pass http://agent_pay;
        }

        # Agents - APAR
        location /api/v1/agents/apar {
            proxy_pass http://agent_ap;
        }

        # Agents - T1 (SSE streaming support)
        location /api/v1/agents/t1 {
            proxy_pass http://agent_t1;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
        }

        # Notifications
        location /api/v1/notifications {
            proxy_pass http://notif;
        }

        # Audit
        location /api/v1/audit {
            proxy_pass http://audit;
        }

        # Connector
        location /api/v1/connector {
            proxy_pass http://connector;
        }

        # Approvals
        location /api/v1/approvals {
            proxy_pass http://approvals;
        }

        # Chart of Accounts
        location /api/v1/coa {
            proxy_pass http://coa;
        }

        # Financial Statements
        location /api/v1/fs {
            proxy_pass http://fs;
        }

        # Onboarding
        location /api/v1/onboarding {
            proxy_pass http://onboard;
        }

        # Health check
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
