name: Build and Publish Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:  # manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ashivashankar91-byte

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - agent-apar
          - agent-eom
          - agent-gl
          - agent-payroll
          - agent-t1
          - analytics-service
          - apar-service
          - api-gateway
          - approval-service
          - audit-service
          - auth-service
          - cashflow-service
          - coa-service
          - compliance-service
          - connector-service
          - document-service
          - eom-service
          - fs-service
          - gl-service
          - group-service
          - notification-service
          - onboarding-service
          - orchestrator-service
          - payroll-service
          - query-service
          - recon-service
          - schedule-service
          - tenant-service
          - user-service
          - webhook-service
          - web

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Resolve Dockerfile path
        id: dockerfile
        run: |
          if [ -f "services/${{ matrix.service }}/Dockerfile" ]; then
            echo "path=services/${{ matrix.service }}/Dockerfile" >> $GITHUB_OUTPUT
          else
            echo "path=apps/${{ matrix.service }}/Dockerfile" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
