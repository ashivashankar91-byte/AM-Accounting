name: Build and Publish Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:  # manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ashivashankar91-byte

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - agent-apar
          - agent-eom
          - agent-gl
          - agent-payroll
          - agent-t1
          - analytics-service
          - apar-service
          - api-gateway
          - approval-service
          - audit-service
          - auth-service
          - cashflow-service
          - coa-service
          - compliance-service
          - connector-service
          - document-service
          - eom-service
          - fs-service
          - gl-service
          - group-service
          - notification-service
          - onboarding-service
          - orchestrator-service
          - payroll-service
          - query-service
          - recon-service
          - schedule-service
          - tenant-service
          - user-service
          - webhook-service
          - web

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          FILE="services/${{ matrix.service }}/Dockerfile"
          [ -f "$FILE" ] || FILE="apps/${{ matrix.service }}/Dockerfile"
          IMAGE="${{ env.IMAGE_PREFIX }}/${{ matrix.service }}"
          docker build -t "${IMAGE}:latest" -t "${IMAGE}:main" -f "$FILE" .
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:main"
