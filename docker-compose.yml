  # --- API Gateway (Fastify reverse proxy) ---
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "3100:3000"
    environment:
      <<: *service-env
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      GL_SERVICE_URL: http://gl-service:3010
      EOM_SERVICE_URL: http://eom-service:3011
      SCHEDULE_SERVICE_URL: http://schedule-service:3018
      GROUP_SERVICE_URL: http://group-service:3039
    depends_on:
      - auth-service
      - gl-service
      - eom-service
      - payroll-service
      - apar-service
      - recon-service
      - schedule-service
      - agent-gl
      - agent-eom
      - agent-payroll
      - agent-apar
      - agent-t1
      - notification-service
      - audit-service
      - connector-service
      - approval-service
      - coa-service
      - fs-service
      - onboarding-service
      - webhook-service
      - cashflow-service
      - document-service
      - group-service
      - compliance-service
      - query-service
      - analytics-service
      - orchestrator-service

  # --- Web Frontend ---
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5174:5174"
    environment:
      VITE_API_URL:
    depends_on:
      - api-gateway
    volumes:
      - ./apps/web/src:/app/src
    command: npx vite --host

volumes:
  pgdata:
