x-service-env: &service-env
  DATABASE_URL: postgresql://amacc:amacc_dev@postgres:5432/amacc
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
  REDIS_URL: redis://redis:6379
  NODE_ENV: development
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-ant-placeholder}
  # AMACC_JWT_SECRET must be set in .env â€” no default allowed in production
  AMACC_JWT_SECRET: ${AMACC_JWT_SECRET:?AMACC_JWT_SECRET is required}
  # auth-service uses JWT_SECRET (its own issuer)
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  JWT_ISSUER: amacc
  ADMIN_API_KEY: ${ADMIN_API_KEY:?ADMIN_API_KEY is required}
  AMACC_INTERNAL_TOKEN: ${AMACC_INTERNAL_TOKEN:-amacc-internal-dev}

x-healthcheck: &healthcheck
  interval: 10s
  timeout: 5s
  retries: 5

services:
  # --- Infrastructure ---
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: amacc
      POSTGRES_PASSWORD: amacc_dev
      POSTGRES_DB: amacc
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amacc"]
      <<: *healthcheck

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *healthcheck

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      <<: *healthcheck

  # --- Core Services ---
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "3001:3001"
    environment:
      <<: *service-env
      PORT: 3001
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  tenant-service:
    build:
      context: .
      dockerfile: services/tenant-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      <<: *service-env
      PORT: 3002
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  # --- Domain Services ---
  gl-service:
    build:
      context: .
      dockerfile: services/gl-service/Dockerfile
    ports:
      - "3010:3010"
    environment:
      <<: *service-env
      PORT: 3010
      EOM_SERVICE_URL: http://eom-service:3011
      SCHEDULE_SERVICE_URL: http://schedule-service:3018
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  eom-service:
    build:
      context: .
      dockerfile: services/eom-service/Dockerfile
    ports:
      - "3011:3011"
    environment:
      <<: *service-env
      PORT: 3011
      GL_SERVICE_URL: http://gl-service:3010
      SCHEDULE_SERVICE_URL: http://schedule-service:3018
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  payroll-service:
