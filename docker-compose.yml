      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      GL_SERVICE_URL: http://gl-service:3010
      EOM_SERVICE_URL: http://eom-service:3011
      PAYROLL_SERVICE_URL: http://payroll-service:3012
      APAR_SERVICE_URL: http://apar-service:3013
      SCHEDULE_SERVICE_URL: http://schedule-service:3018
      FS_SERVICE_URL: http://fs-service:3045
      APPROVAL_SERVICE_URL: http://approval-service:3054
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  # --- Integration Services ---
  notification-service:
