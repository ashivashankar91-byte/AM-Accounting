# ============================================================================
# AMACC AI Agent Services (5 services)
# ============================================================================

# --- agent-gl :3020 ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-gl
  namespace: amacc
  labels:
    app: agent-gl
    tier: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-gl
  template:
    metadata:
      labels:
        app: agent-gl
        tier: agent
    spec:
      initContainers:
        - name: wait-rabbitmq
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z rabbitmq 5672; do sleep 2; done']
      containers:
        - name: agent-gl
          image: amacc/agent-gl:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3020
          env:
            - name: PORT
              value: "3020"
          envFrom:
            - configMapRef:
                name: amacc-config
            - secretRef:
                name: amacc-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3020
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: agent-gl
  namespace: amacc
spec:
  selector:
    app: agent-gl
  ports:
    - port: 3020
      targetPort: 3020

