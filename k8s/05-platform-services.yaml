# ============================================================================
# AMACC Platform Services (10 services)
# ============================================================================

# --- auth-service :3001 ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: amacc
  labels:
    app: auth-service
    tier: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        tier: platform
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do sleep 2; done']
      containers:
        - name: auth-service
          image: amacc/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
          envFrom:
            - configMapRef:
                name: amacc-config
            - secretRef:
                name: amacc-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: amacc
spec:
  selector:
    app: auth-service
  ports:
    - port: 3001
      targetPort: 3001

