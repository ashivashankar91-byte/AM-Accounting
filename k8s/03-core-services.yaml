# ============================================================================
# AMACC Core Accounting Services (8 services)
# ============================================================================
# Each service: Deployment (1 replica) + ClusterIP Service
# All share amacc-config ConfigMap and amacc-secrets Secret
# ============================================================================

# --- gl-service :3010 ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gl-service
  namespace: amacc
  labels:
    app: gl-service
    tier: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gl-service
  template:
    metadata:
      labels:
        app: gl-service
        tier: core
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do sleep 2; done']
      containers:
        - name: gl-service
          image: amacc/gl-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3010
          env:
            - name: PORT
              value: "3010"
          envFrom:
            - configMapRef:
                name: amacc-config
            - secretRef:
                name: amacc-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: gl-service
  namespace: amacc
spec:
  selector:
    app: gl-service
  ports:
    - port: 3010
      targetPort: 3010

