# ============================================================================
# AMACC Extended / Gap-Filling Services (9 services)
# ============================================================================

# --- user-service :3040 ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: amacc
  labels:
    app: user-service
    tier: extended
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        tier: extended
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do sleep 2; done']
      containers:
        - name: user-service
          image: amacc/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3040
          env:
            - name: PORT
              value: "3040"
          envFrom:
            - configMapRef:
                name: amacc-config
            - secretRef:
                name: amacc-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3040
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: amacc
spec:
  selector:
    app: user-service
  ports:
    - port: 3040
      targetPort: 3040

