# ============================================================================
# NGINX API Gateway — ConfigMap + Deployment + Service
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: amacc
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        upstream auth      { server auth-service:3001; }
        upstream tenants   { server tenant-service:3002; }
        upstream gl        { server gl-service:3010; }
        upstream eom       { server eom-service:3011; }
        upstream payroll   { server payroll-service:3012; }
        upstream apar      { server apar-service:3013; }
        upstream recon     { server recon-service:3014; }
        upstream agent_gl  { server agent-gl:3020; }
        upstream agent_eom { server agent-eom:3021; }
        upstream agent_pay { server agent-payroll:3022; }
        upstream agent_ap  { server agent-apar:3023; }
        upstream agent_t1  { server agent-t1:3024; }
        upstream notif     { server notification-service:3030; }
        upstream audit     { server audit-service:3031; }
        upstream connector { server connector-service:3032; }
        upstream approvals { server approval-service:3033; }
        upstream coa       { server coa-service:3016; }
        upstream fs        { server fs-service:3015; }
        upstream onboard   { server onboarding-service:3035; }
        upstream webhooks  { server webhook-service:3036; }
        upstream cashflow  { server cashflow-service:3037; }
        upstream documents { server document-service:3038; }
        upstream groups    { server group-service:3039; }
        upstream analytics { server analytics-service:3046; }
        upstream ml        { server ml-service:3047; }

        map $http_x_tenant_id $tenant_id {
            default       $http_x_tenant_id;
            ""            "tenant-kunes";
        }

        server {
            listen 80;
            absolute_redirect off;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header x-tenant-id $tenant_id;
            proxy_set_header x-admin-api-key $http_x_admin_api_key;
            proxy_set_header x-user-id $http_x_user_id;
            proxy_set_header Authorization $http_authorization;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, x-tenant-id, x-admin-api-key, x-user-id" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) { return 204; }

            location /api/v1/auth       { proxy_pass http://auth; }
            location /api/v1/tenants    { proxy_pass http://tenants; }
            location /api/v1/gl         { proxy_pass http://gl; }
            location /api/v1/dashboard  { proxy_pass http://gl; }
            location /api/v1/command-center { proxy_pass http://gl; }
            location /api/v1/eom        { proxy_pass http://eom; }
            location /api/v1/payroll    { proxy_pass http://payroll; }
            location /api/v1/apar       { proxy_pass http://apar; }
            location /api/v1/recon      { proxy_pass http://recon; }
            location /api/v1/agents/log { proxy_pass http://agent_t1; }
            location /api/v1/agents/gl  { proxy_pass http://agent_gl; }
            location /api/v1/agents/eom { proxy_pass http://agent_eom; }
            location /api/v1/agents/payroll { proxy_pass http://agent_pay; }
            location /api/v1/agents/apar { proxy_pass http://agent_ap; }
            location /api/v1/agents/t1  {
                proxy_pass http://agent_t1;
                proxy_buffering off;
                proxy_cache off;
                proxy_set_header Connection '';
                proxy_http_version 1.1;
                chunked_transfer_encoding off;
            }
            location /api/v1/notifications { proxy_pass http://notif; }
            location /api/v1/audit      { proxy_pass http://audit; }
            location /api/v1/connector  { proxy_pass http://connector; }
            location /api/v1/approvals  { proxy_pass http://approvals; }
            location /api/v1/coa        { proxy_pass http://coa; }
            location /api/v1/fs         { proxy_pass http://fs; }
            location /api/v1/onboarding { proxy_pass http://onboard; }
            location /api/v1/webhooks   { proxy_pass http://webhooks; }
            location /api/v1/cashflow   { proxy_pass http://cashflow; }
            location /api/v1/documents  { proxy_pass http://documents; }
            location /api/v1/groups     { proxy_pass http://groups; }
            location /api/v1/analytics  { proxy_pass http://analytics; }
            location /api/v1/ml         { proxy_pass http://ml; }
            location /health { return 200 '{"status":"ok"}'; add_header Content-Type application/json; }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: amacc
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
      volumes:
        - name: nginx-conf
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: amacc
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 80

# ============================================================================
# Frontend — React SPA
# ============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: amacc
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: amacc/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5174
          env:
            - name: VITE_API_URL
              value: ""
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: amacc
spec:
  selector:
    app: web
  ports:
    - port: 5174
      targetPort: 5174

# ============================================================================
# Ingress — Single entry point (works with nginx-ingress or traefik)
# ============================================================================
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: amacc-ingress
  namespace: amacc
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 5174
